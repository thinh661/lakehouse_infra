# Production values for MinIO on RKE2 Lakehouse cluster
# Chart: minio/minio v5.4.0 (chart chính thống, KHÔNG phải Bitnami)
# AppVersion: RELEASE.2024-12-18T13-15-44Z
# Mode: standalone (single-node, tối thiểu tài nguyên, không HA)

# ---------------------------------------------------------------------------
# Container Images
# ---------------------------------------------------------------------------
image:
  repository: quay.io/minio/minio
  tag: RELEASE.2024-12-18T13-15-44Z
  pullPolicy: IfNotPresent

mcImage:
  repository: quay.io/minio/mc
  tag: RELEASE.2024-11-21T17-21-54Z
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Deployment Mode
# ---------------------------------------------------------------------------
# Dùng standalone để tối thiểu tài nguyên.
# MinIO standalone là 1 pod, 1 drive - phù hợp cho lab/dev và log storage.
mode: standalone

# Standalone: 1 replica, 1 drive per node
replicas: 1
drivesPerNode: 1
pools: 1

# ---------------------------------------------------------------------------
# Credentials (sử dụng existingSecret - KHÔNG commit plaintext vào Git)
# Tạo secret trước khi sync ArgoCD:
#   kubectl create secret generic minio-credentials -n minio \
#     --from-literal=rootUser=minioadmin \
#     --from-literal=rootPassword=<strong-password-at-least-8-chars>
# ---------------------------------------------------------------------------
existingSecret: "minio-credentials"
rootUser: ""
rootPassword: ""

# ---------------------------------------------------------------------------
# Persistence (sử dụng Longhorn StorageClass)
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 5Gi
  annotations: {}

# ---------------------------------------------------------------------------
# Resources (minimal cho standalone lab)
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 500m

# ---------------------------------------------------------------------------
# Service Configuration
# ---------------------------------------------------------------------------
# S3 API Service (nội bộ cluster - ClusterIP)
service:
  type: ClusterIP
  clusterIP: ~
  port: 9000
  nodePort: ~
  annotations: {}

# Console Service (nội bộ cluster - ClusterIP, expose qua Ingress)
consoleService:
  type: ClusterIP
  clusterIP: ~
  port: 9001
  nodePort: ~
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress cho MinIO Console (UI)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: "traefik"
  labels: {}
  annotations:
    cert-manager.io/cluster-issuer: lakehouse-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  path: /
  hosts:
    - minio.lakehouse.local
  tls:
    - secretName: minio-console-tls
      hosts:
        - minio.lakehouse.local

# Ingress cho MinIO S3 API (không expose ra ngoài cluster)
consoleIngress:
  enabled: false

# ---------------------------------------------------------------------------
# Buckets tạo tự động khi khởi tạo
# Chart sẽ tạo bucket qua mc job sau khi MinIO sẵn sàng
#
# Thiết kế 2 bucket tách biệt:
#  - spark-events-batch  : Event logs của SparkApplication batch jobs (ETL, ML)
#                          → Spark History Server (batch) đọc từ đây
#  - spark-events-connect: Event logs của Spark Connect servers (sc-dev, future sc-<project>)
#                          → Spark History Server (connect) đọc từ đây
#                          → Live UI qua Ingress khi server đang chạy
# ---------------------------------------------------------------------------
buckets:
  - name: spark-events-batch
    policy: none
    purge: false
    versioning: false
    objectlocking: false
  - name: spark-events-connect
    policy: none
    purge: false
    versioning: false
    objectlocking: false

# ---------------------------------------------------------------------------
# Policies (IAM-style, tùy chọn)
# ---------------------------------------------------------------------------
policies: []

# ---------------------------------------------------------------------------
# Users (tùy chọn, có thể tạo thêm user riêng cho Spark)
# ---------------------------------------------------------------------------
users: []

# ---------------------------------------------------------------------------
# Security Context
# ---------------------------------------------------------------------------
securityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  enabled: false

# ---------------------------------------------------------------------------
# Node Scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Pod Settings
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

# Tắt tính năng update check (offline environment)
environment:
  MINIO_UPDATE: "off"
  MINIO_BROWSER: "on"

# ---------------------------------------------------------------------------
# Metrics (tắt ServiceMonitor nếu chưa có Prometheus Operator)
# ---------------------------------------------------------------------------
metrics:
  serviceMonitor:
    enabled: false
    includeNode: false
    public: true
    additionalLabels: {}
    annotations: {}
    relabelConfigs: {}
    relabelConfigsAdditional: []
    namespace: ~

# ---------------------------------------------------------------------------
# MinIO Init Job (tạo buckets và policies)
# ---------------------------------------------------------------------------
makeBucketJob:
  securityContext:
    enabled: false
    runAsUser: 1000
    runAsGroup: 1000
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
  exitCommand: ""

makeUserJob:
  securityContext:
    enabled: false
    runAsUser: 1000
    runAsGroup: 1000
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
  exitCommand: ""

makePolicyJob:
  securityContext:
    enabled: false
    runAsUser: 1000
    runAsGroup: 1000
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
  exitCommand: ""

makeServiceAccountJob:
  securityContext:
    enabled: false
    runAsUser: 1000
    runAsGroup: 1000
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
  exitCommand: ""

# ---------------------------------------------------------------------------
# TLS (tắt TLS nội bộ MinIO - TLS được xử lý bởi Traefik + cert-manager ở edge)
# ---------------------------------------------------------------------------
tls:
  enabled: false
  certSecret: ""
  publicCrt: public.crt
  privateKey: private.key

trustedCertsSecret: ""

# ---------------------------------------------------------------------------
# GitOps compatibility
# ---------------------------------------------------------------------------
# Tắt checksum-based rollout để tránh unnecessary restart khi dùng GitOps
ignoreChartChecksums: true

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
clusterDomain: cluster.local
nameOverride: ""
fullnameOverride: ""
deploymentUpdate:
  type: RollingUpdate
  maxUnavailable: 0
  maxSurge: 100%
statefulSetUpdate:
  updateStrategy: RollingUpdate
