# MinIO S3 API Ingress (tùy chọn)
# File này chỉ cần apply nếu muốn expose MinIO S3 API ra ngoài cluster qua Traefik.
# Mặc định: S3 API (port 9000) chỉ dùng nội bộ cluster qua ClusterIP Service.
#
# CẢNH BÁO: Chỉ expose S3 API ra ngoài khi thực sự cần thiết (ví dụ: tool local cần upload dữ liệu).
# Cân nhắc bảo mật: S3 API không có xác thực HTTPS-level mạnh như Console UI.
#
# Để enable: bỏ comment toàn bộ manifest dưới đây và commit vào Git.

