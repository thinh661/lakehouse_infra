apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: keycloak
type: Opaque
stringData:
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: KeycloakDbPass123!
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: keycloak
type: Opaque
stringData:
  # Keycloak 26 bootstrap credentials
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: KeycloakAdminPass123!
  # Legacy credentials for compatibility
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: KeycloakAdminPass123!
