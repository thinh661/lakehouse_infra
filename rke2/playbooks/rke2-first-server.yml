---
- name: Install and Initialize First RKE2 Server Node
  hosts: rke2_first_server
  become: yes
  tasks:
    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: '0750'

    - name: Create RKE2 configuration file
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          token: "{{ rke2_token }}"
          tls-san:
            {% for san in tls_sans %}
            - "{{ san }}"
            {% endfor %}
        mode: '0600'

    - name: Download and install RKE2 server binary
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION="{{ rke2_version }}" sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable and start rke2-server service
      systemd:
        name: rke2-server
        state: started
        enabled: yes
      register: rke2_start
      until: rke2_start is succeeded
      retries: 3
      delay: 10

    - name: Wait for Kubernetes API Port to be active
      wait_for:
        port: 6443
        delay: 10
        timeout: 300

    - name: Create symlinks for kubectl and crictl
      file:
        src: "/var/lib/rancher/rke2/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: yes
      loop:
        - kubectl
        - crictl

    - name: Export KUBECONFIG in root profile
      lineinfile:
        path: /root/.bashrc
        line: 'export KUBECONFIG=/etc/rancher/rke2/rke2.yaml'
        create: yes
        state: present
