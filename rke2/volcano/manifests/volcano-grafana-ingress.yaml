apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: volcano-grafana
  namespace: volcano-system
  annotations:
    cert-manager.io/cluster-issuer: lakehouse-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: grafana-volcano.lakehouse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
  tls:
    - hosts:
        - grafana-volcano.lakehouse.local
      secretName: volcano-grafana-tls
