apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: spark-operator
spec:
  type: Scala
  mode: cluster
  image: "docker.io/thinh661/spark-connect:3.5.0"
  imagePullPolicy: Always
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: "local:///opt/spark/examples/jars/spark-examples_2.12-3.5.0.jar"
  sparkVersion: "3.5.0"
  batchScheduler: "volcano"
  sparkConf:
    # --- Event Logging -> MinIO spark-events-batch bucket ---
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://spark-events-batch/logs"
    "spark.hadoop.fs.s3a.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.access.key": "minioadmin"
    "spark.hadoop.fs.s3a.secret.key": "123123123"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    "spark.hadoop.fs.s3a.metadatastore.impl": "org.apache.hadoop.fs.s3a.s3guard.NullMetadataStore"
  driver:
    cores: 1                 # Giữ nguyên số nguyên 1 (Spark internal cores)
    coreRequest: "100m"      # Thêm dòng này: CPU Request thực tế gửi lên K8s (100m CPU)
    coreLimit: "200m"        # CPU Limit (200m CPU) - Nhỏ hơn giới hạn 500m của namespace
    memory: "512m"
    memoryOverhead: "128m"
    labels:
      version: 3.5.0
    serviceAccount: spark-service-account
  executor:
    cores: 1                 # Giữ nguyên số nguyên 1
    coreRequest: "100m"      # Thêm dòng này: CPU Request thực tế gửi lên K8s (100m CPU)
    coreLimit: "200m"        # CPU Limit (200m CPU)
    instances: 1             # Để 1 instance để kiểm tra nhanh
    memory: "512m"
    memoryOverhead: "128m"
    labels:
      version: 3.5.0